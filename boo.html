<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varragan</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="full-img-cont">
        <img class="img1" src="assets/the-exorcist.jpg" alt="Description">
        <img class="img2" src="assets/youth_is_the_answer.JPG" alt="Description">
        <a class="link2" href="www.youtube.com">YOUTH IS THE ANSWER</a>
    </div>

    <!-- audio for boo page -->
    <audio id="scareAudio" preload="auto">
        <source src="assets/audio.mp3" type="audio/mpeg">
    </audio>

    <script>
        // try to play as soon as the page loads; if blocked the user can click anywhere to start
        window.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('scareAudio');
            // attempt to play immediately
            audio.play().catch(() => {
                // if autoplay is blocked, let the user click to start
                document.body.addEventListener('click', () => {
                    audio.play();
                }, { once: true });
            });
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
